services:
  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.3
    container_name: analyst-copilot-logstash
    environment:
      LS_JAVA_OPTS: -Xms512m -Xmx512m
      LOGSTASH_INDEX: ${LOGSTASH_INDEX:-16af-events-dev}
      LOGSTASH_ENABLE_ES_OUTPUT: ${LOGSTASH_ENABLE_ES_OUTPUT:-false}
      ELASTICSEARCH_HOSTS: ${ELASTICSEARCH_HOSTS:-http://host.docker.internal:9200}
    ports:
      - "${LOGSTASH_API_PORT:-9600}:9600"
    volumes:
      - ./config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./config/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./pipeline:/usr/share/logstash/pipeline:ro
      - ../data/samples:/usr/share/logstash/ingest:ro
      - ./output:/usr/share/logstash/output

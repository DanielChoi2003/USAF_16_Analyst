version: "3.8"

services:
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=none
    volumes:
      - ./data:/data
  
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.3
    container_name: analyst-copilot-kibana
    environment:
      - ELASTICSEARCH_HOSTS=${KIBANA_ELASTICSEARCH_HOSTS:-https://host.docker.internal:9200}
      - KIBANA_ELASTICSEARCH_SERVICE_TOKEN=${KIBANA_ELASTICSEARCH_SERVICE_TOKEN:-}
      - KIBANA_ANONYMOUS_USERNAME=${KIBANA_ANONYMOUS_USERNAME:-analyst_kibana_guest}
      - KIBANA_ANONYMOUS_PASSWORD=${KIBANA_ANONYMOUS_PASSWORD:-analyst-copilot-guest-password}
    ports:
      - "5601:5601"
    volumes:
      - ./config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro

  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.3
    container_name: analyst-copilot-logstash
    env_file:
      - ../../.env
    environment:
      LS_JAVA_OPTS: -Xms512m -Xmx512m
      LOGSTASH_INDEX: ${LOGSTASH_INDEX:-investigation-events}
      LOGSTASH_ENABLE_ES_OUTPUT: ${LOGSTASH_ENABLE_ES_OUTPUT:-true}
      ELASTICSEARCH_HOSTS: ${ELASTICSEARCH_HOSTS:-https://host.docker.internal:9200}
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME:-elastic}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-}
    ports:
      - "${LOGSTASH_API_PORT:-9600}:9600"
    volumes:
      - ./config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./config/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./pipeline:/usr/share/logstash/pipeline:ro
      - ../../data/samples:/usr/share/logstash/ingest:ro
      - ./output:/usr/share/logstash/output

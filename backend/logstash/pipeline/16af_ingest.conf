input {
  file {
    id => "16af-package-json"
    path => "/usr/share/logstash/ingest/*.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
    exit_after_read => true
    codec => multiline {
      pattern => "^$"
      negate => true
      what => "previous"
      auto_flush_interval => 1
    }
  }
}

filter {
  json {
    source => "message"
    remove_field => ["message"]
  }

  split {
    field => "[events]"
  }

  mutate {
    rename => {
      "[events]" => "[event_detail]"
    }
    copy => {
      "[event_detail][timestamp]" => "[event_timestamp]"
      "[event_detail][raw_excerpt]" => "[message]"
      "[event_detail][id]" => "[@metadata][document_id]"
    }
    add_tag => [
      "16af",
      "siem",
      "logstash"
    ]
  }

  ruby {
    code => '
      event_id = event.get("[event_detail][id]")
      if event_id.nil? || event_id.to_s.strip.empty?
        event.cancel
        next
      end

      event.set("[@metadata][enable_es_output]", ENV.fetch("LOGSTASH_ENABLE_ES_OUTPUT", "false"))
      event.set("[@metadata][target_index]", ENV.fetch("LOGSTASH_INDEX", "investigation-events"))

      event.set("[event][id]", event_id)
      event.set("[event][category]", event.get("[event_detail][category]"))
      event.set("[event][action]", event.get("[event_detail][action]"))
      event.set("[event][subtype]", event.get("[event_detail][subtype]"))
      event.set("[event][kind]", "event")
      event.set("[event][dataset]", "16af.siem")

      event.set("[observer][type]", "logstash")
      event.set("[observer][name]", "analyst-copilot")

      event.set("[host]", event.get("[event_detail][host]") || {})
      event.set("[user]", event.get("[event_detail][user]") || {})
      event.set("[process]", event.get("[event_detail][process]") || {})
      event.set("raw_excerpt", event.get("[event_detail][raw_excerpt]"))

      iocs = event.get("[event_detail][iocs]") || {}
      event.set("ioc_matches", iocs["matches"] || [])

      enrichment = event.get("enrichment") || {}
      misp_matches = enrichment["misp_matches"] || []
      event.set("[enrichment][misp_match_count]", misp_matches.length)

      if event.get("event_timestamp").nil?
        event.set("event_timestamp", event.get("detected_at"))
      end
    '
  }

  date {
    match => ["event_timestamp", "ISO8601"]
    target => "@timestamp"
  }

  mutate {
    remove_field => [
      "[event_detail]",
      "event_timestamp",
      "[log]",
      "@version",
      "path"
    ]
  }
}

output {
  stdout {
    codec => json_lines
  }

  file {
    path => "/usr/share/logstash/output/normalized-events.ndjson"
    codec => json_lines
  }

  if [@metadata][enable_es_output] == "true" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS:https://host.docker.internal:9200}"]
      user => "${ELASTICSEARCH_USERNAME:elastic}"
      password => "${ELASTIC_PASSWORD:}"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "%{[@metadata][target_index]}"
      document_id => "%{[@metadata][document_id]}"
    }
  }
}
